<body>

<header>
    <nav class="navbar">.
        <a href="index.html"> 
            <h1><em>Mocha Melt</em></h1></a> 
        
        <ul class="nav-menu">
            <li class="nav-item">
                <a href="#Home" >Home</a></li>

            <li class="nav-item">
                <a href="#location">Location</a></li>

            <li class="nav-item">

            <li class="nav-item">

            <span class="bar"></span>

   </nav>
</header>

<section class="hero">
    <div class="hero-curve">
        <h1>- Contact -</h1>
        <p>
            Have a large party? MochaMelt can set up a reservation.<br>
            We'd love to hear from you!
        </p>
    </div>
</section>

<section class="contact-wrapper">

    <div class="form-card">

        <h2>Get in touch!</h2>
        <p class="subtitle">
            Interested in hosting an event at MochaMelt?<br>
            Fill out the form below!
        </p>

    <form id="contactForm">

        <label>Name</label>
        <input type="text" required>

        <label>Email</label>
        <input type="email" required>

        <label>Phone Number</label>
        <input type="tel">

        <label>Select a Date and Time</label>
        <input type="datetime-local">

        <label>Message</label>
        <textarea rows="5"></textarea>

        <button type="submit">Submit</button>

    </form>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
