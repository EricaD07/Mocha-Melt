<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MochaMat Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="logo">MochaMat</div>

  <nav>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Location</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Menu</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>
</header>

<section class="hero">
  <div class="hero-curve">
    <h1>- Contact -</h1>
    <p>
      Have a large party? MochaMat can set up a reservation.<br>
      We'd love to hear from you!
    </p>
  </div>
</section>

<section class="contact-wrapper">

  <div class="form-card">

    <h2>Get in touch!</h2>
    <p class="subtitle">
      Interested in hosting an event at MochaMat?<br>
      Fill out the form below!
    </p>

    <form id="contactForm">

      <label>Name</label>
      <input type="text" required>

      <label>Email</label>
      <input type="email" required>

      <label>Phone Number</label>
      <input type="tel">

      <label>Select a Date and Time</label>
      <input type="datetime-local">

      <label>Message</label>
      <textarea rows="5"></textarea>

      <button type="submit">Submit</button>

    </form>

  </div>

</section>

<script src="script.js"></script>

</body>
</html>
